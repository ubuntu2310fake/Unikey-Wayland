name: CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-package:
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-26.04-arm]
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake qt6-base-dev libwayland-dev wayland-protocols pkg-config libarchive-tools golang rpm debhelper devscripts build-essential libibus-1.0-dev libxkbcommon-dev

      - name: Build Source
        run: |
          mkdir -p wayland-client/build
          cd wayland-client/build
          cmake ..
          make -j$(nproc)
          
      - name: Clean up old releases
        run: rm -rf releases/*

      - name: Package Arch Linux
        run: |
          chmod +x package_arch.sh
          ./package_arch.sh

      - name: Build Debian/Ubuntu Package (.deb)
        run: |
          dpkg-buildpackage -b -us -uc
          mkdir -p releases
          mv ../*.deb releases/

      - name: Build Fedora RPM Package (.rpm)
        run: |
          mkdir -p ~/rpmbuild/SOURCES
          mkdir -p ~/rpmbuild/SPECS
          cp wayland-client/build/unikey-wayland ~/rpmbuild/SOURCES/
          cp unikey-wayland.desktop ~/rpmbuild/SOURCES/
          cp unikey-wayland.metainfo.xml ~/rpmbuild/SOURCES/
          cp unikey-wayland.spec ~/rpmbuild/SPECS/
          rpmbuild -bb ~/rpmbuild/SPECS/unikey-wayland.spec --define "_topdir $HOME/rpmbuild"
          cp ~/rpmbuild/RPMS/*/*.rpm releases/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unikey-wayland-packages
          path: |
            releases/*.pkg.tar.zst
            releases/*.deb
            releases/*.rpm

      - name: Get Version
        run: |
          VERSION=$(grep "^PKGVER=" package_arch.sh | cut -d'"' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          body: |
            Tự động đóng gói và phát hành phiên bản mới cho 3 hệ điều hành (Arch Linux, Ubuntu/Debian, Fedora).
            Chi tiết các thay đổi xem tại [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/master/CHANGELOG.md).
          draft: false
          prerelease: false
          files: |
            releases/*.pkg.tar.zst
            releases/*.deb
            releases/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-copr:
    runs-on: ubuntu-latest
    container: fedora:40
    steps:
      - uses: actions/checkout@v4

      - name: Clean up old releases
        run: rm -rf releases/*

      - name: Install Fedora Dependencies
        run: |
          dnf install -y cmake gcc-c++ qt6-qtbase-devel wayland-devel wayland-protocols-devel pkgconfig golang rpm-build copr-cli git

      - name: Build Source
        run: |
          mkdir -p wayland-client/build
          cd wayland-client/build
          cmake ..
          make -j$(nproc)

      - name: Build Fedora SRPM
        run: |
          mkdir -p ~/rpmbuild/SOURCES
          mkdir -p ~/rpmbuild/SPECS
          mkdir -p releases
          cp wayland-client/build/unikey-wayland ~/rpmbuild/SOURCES/
          cp unikey-wayland.desktop ~/rpmbuild/SOURCES/
          cp unikey-wayland.metainfo.xml ~/rpmbuild/SOURCES/
          cp unikey-wayland.spec ~/rpmbuild/SPECS/
          rpmbuild -bs ~/rpmbuild/SPECS/unikey-wayland.spec --define "_topdir $HOME/rpmbuild"
          cp ~/rpmbuild/SRPMS/*.src.rpm releases/

      - name: Upload to Copr
        env:
          COPR_CONFIG: ${{ secrets.COPR_CONFIG }}
        run: |
          mkdir -p ~/.config
          echo "$COPR_CONFIG" > ~/.config/copr
          chmod 600 ~/.config/copr
          chmod +x upload_copr.sh
          ./upload_copr.sh

  build-ppa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PPA Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts debhelper gnupg curl dput

      - name: Configure GPG and Import Key
        env:
          PPA_GPG_PRIVATE_KEY: ${{ secrets.PPA_GPG_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "$PPA_GPG_PRIVATE_KEY" | gpg --batch --yes --import

      - name: Upload to Ubuntu PPA
        env:
          PPA_GPG_KEY_ID: ${{ secrets.PPA_GPG_KEY_ID }}
          PPA_FTP_SERVER: ${{ secrets.PPA_FTP_SERVER }}
          PPA_FTP_PATH: ${{ secrets.PPA_FTP_PATH }}
          PPA_GPG_PASSPHRASE: ${{ secrets.PPA_GPG_PASSPHRASE }}
          PPA_REVISION: ppa${{ github.run_number }}
        run: |
          # Sử dụng PATH hijacking để tạo gpg wrapper tự động điền passphrase cho debsign
          mkdir -p /tmp/bin
          cat << 'EOF' > /tmp/bin/gpg
          #!/bin/bash
          exec /usr/bin/gpg --batch --no-tty --pinentry-mode loopback --passphrase "$PPA_GPG_PASSPHRASE" "$@"
          EOF
          chmod +x /tmp/bin/gpg
          export PATH="/tmp/bin:$PATH"
          
          chmod +x upload_ppa.sh
          ./upload_ppa.sh

  build-windows:
    runs-on: windows-2025-vs2026
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          dir: 'C:/Qt'

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build UnikeyWayland
        shell: cmd
        run: |
          mkdir windows-client\build
          cd windows-client\build
          cmake -DCMAKE_PREFIX_PATH="%QT_ROOT_DIR%" ..
          cmake --build . --config Release

      - name: Prepare Package Bundle
        shell: cmd
        run: |
          mkdir dist
          copy windows-client\build\Release\UnikeyWayland.exe dist\
          copy windows-client\bamboo.dll dist\
          
          :: Chạy windeployqt thu thập DLL
          windeployqt --dir dist dist\UnikeyWayland.exe --no-translations --no-system-d3d-compiler
          
          :: Tạo thư mục đóng gói phân phối
          mkdir installer_dir
          
          :: Nén toàn bộ app thành UnikeyWayland.7z
          "C:\Program Files\7-Zip\7z.exe" a -t7z installer_dir\UnikeyWayland.7z .\dist\*
          
          :: Copy 7z binary và file cài đặt setup.bat vào thư mục phân phối
          copy "C:\Program Files\7-Zip\7z.exe" installer_dir\
          copy "C:\Program Files\7-Zip\7z.dll" installer_dir\
          copy windows-client\setup.bat installer_dir\
          
          :: Nén tất cả thành 1 file Zip tiện phân phối
          mkdir releases
          "C:\Program Files\7-Zip\7z.exe" a -tzip releases\UnikeyWayland-Windows.zip .\installer_dir\*

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: UnikeyWayland-Windows-Release
          path: releases/UnikeyWayland-Windows.zip

      - name: Get Version
        shell: bash
        run: |
          VERSION=$(grep "^PKGVER=" package_arch.sh | cut -d'"' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Upload Windows Asset to GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        with:
          tag_name: ${{ env.VERSION }}
          files: releases/UnikeyWayland-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

