name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake qt6-base-dev libwayland-dev wayland-protocols pkg-config libarchive-tools golang

      - name: Build Source
        run: |
          mkdir -p wayland-client/build
          cd wayland-client/build
          cmake ..
          make -j$(nproc)
          
      - name: Package Arch Linux
        run: |
          chmod +x package_arch.sh
          ./package_arch.sh

      - name: Upload Arch Artifact
        uses: actions/upload-artifact@v4
        with:
          name: unikey-wayland-arch-pkg
          path: releases/*.pkg.tar.zst

  upload-copr:
    runs-on: ubuntu-latest
    container: fedora:40
    if: false  # Tạm thời vô hiệu hóa theo yêu cầu của user để không chạy lại Copr
    steps:
      - uses: actions/checkout@v4

      - name: Install Fedora Dependencies
        run: |
          dnf install -y cmake gcc-c++ qt6-qtbase-devel wayland-devel wayland-protocols-devel pkgconfig golang rpm-build copr-cli git

      - name: Build Source
        run: |
          mkdir -p wayland-client/build
          cd wayland-client/build
          cmake ..
          make -j$(nproc)

      - name: Build Fedora SRPM
        run: |
          mkdir -p ~/rpmbuild/SOURCES
          mkdir -p ~/rpmbuild/SPECS
          mkdir -p releases
          cp wayland-client/build/unikey-wayland ~/rpmbuild/SOURCES/
          cp unikey-wayland.desktop ~/rpmbuild/SOURCES/
          cp unikey-wayland.metainfo.xml ~/rpmbuild/SOURCES/
          cp unikey-wayland.spec ~/rpmbuild/SPECS/
          rpmbuild -bs ~/rpmbuild/SPECS/unikey-wayland.spec --define "_topdir $HOME/rpmbuild"
          cp ~/rpmbuild/SRPMS/*.src.rpm releases/

      - name: Upload to Copr
        env:
          COPR_CONFIG: ${{ secrets.COPR_CONFIG }}
        run: |
          mkdir -p ~/.config
          echo "$COPR_CONFIG" > ~/.config/copr
          chmod 600 ~/.config/copr
          chmod +x upload_copr.sh
          ./upload_copr.sh

  build-ppa:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install PPA Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts debhelper gnupg curl

      - name: Configure GPG and Import Key
        env:
          PPA_GPG_PRIVATE_KEY: ${{ secrets.PPA_GPG_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "no-tty" >> ~/.gnupg/gpg.conf
          echo "batch" >> ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          chmod 600 ~/.gnupg/* 2>/dev/null || true
          gpg-connect-agent reloadagent /bye || true
          echo "$PPA_GPG_PRIVATE_KEY" | gpg --batch --yes --import

      - name: Upload to Ubuntu PPA
        env:
          PPA_GPG_KEY_ID: ${{ secrets.PPA_GPG_KEY_ID }}
          PPA_FTP_SERVER: ${{ secrets.PPA_FTP_SERVER }}
          PPA_FTP_PATH: ${{ secrets.PPA_FTP_PATH }}
        run: |
          chmod +x upload_ppa.sh
          # Truyền trực tiếp --passphrase từ Github Secrets vào DEBSIGN_GPGOPTS
          export DEBSIGN_GPGOPTS="--batch --no-tty --pinentry-mode loopback --passphrase ${{ secrets.PPA_GPG_PASSPHRASE }}"
          ./upload_ppa.sh
