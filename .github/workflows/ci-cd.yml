name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-package:
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-26.04-arm]
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake qt6-base-dev libwayland-dev wayland-protocols pkg-config libarchive-tools golang rpm debhelper devscripts build-essential libibus-1.0-dev libxkbcommon-dev

      - name: Build Source
        run: |
          mkdir -p wayland-client/build
          cd wayland-client/build
          cmake ..
          make -j$(nproc)
          
      - name: Clean up old releases
        run: rm -rf releases/*

      - name: Package Arch Linux
        run: |
          chmod +x package_arch.sh
          ./package_arch.sh

      - name: Build Debian/Ubuntu Package (.deb)
        run: |
          dpkg-buildpackage -b -us -uc
          mkdir -p releases
          mv ../*.deb releases/

      - name: Build Fedora RPM Package (.rpm)
        run: |
          mkdir -p ~/rpmbuild/SOURCES
          mkdir -p ~/rpmbuild/SPECS
          cp wayland-client/build/unikey-wayland ~/rpmbuild/SOURCES/
          cp unikey-wayland.desktop ~/rpmbuild/SOURCES/
          cp unikey-wayland.metainfo.xml ~/rpmbuild/SOURCES/
          cp unikey-wayland.spec ~/rpmbuild/SPECS/
          rpmbuild -bb ~/rpmbuild/SPECS/unikey-wayland.spec --define "_topdir $HOME/rpmbuild"
          cp ~/rpmbuild/RPMS/*/*.rpm releases/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unikey-wayland-packages
          path: |
            releases/*.pkg.tar.zst
            releases/*.deb
            releases/*.rpm

      - name: Get Version
        run: |
          VERSION=$(grep "^PKGVER=" package_arch.sh | cut -d'"' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          body: |
            Tự động đóng gói và phát hành phiên bản mới cho 4 hệ điều hành (Windows, Ubuntu, Fedora, Arch Linux).
            Chi tiết các thay đổi xem tại [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md).
            
            ### Code Signing
            
            Windows release binaries of Unikey-Wayland are intended to be digitally signed through the SignPath Foundation open-source code signing program.
          draft: false
          prerelease: false
          files: |
            releases/*.pkg.tar.zst
            releases/*.deb
            releases/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-copr:
    runs-on: ubuntu-latest
    container: fedora:40
    steps:
      - uses: actions/checkout@v4

      - name: Clean up old releases
        run: rm -rf releases/*

      - name: Install Fedora Dependencies
        run: |
          dnf install -y cmake gcc-c++ qt6-qtbase-devel wayland-devel wayland-protocols-devel pkgconfig golang rpm-build copr-cli git

      - name: Build Source
        run: |
          mkdir -p wayland-client/build
          cd wayland-client/build
          cmake ..
          make -j$(nproc)

      - name: Build Fedora SRPM
        run: |
          mkdir -p ~/rpmbuild/SOURCES
          mkdir -p ~/rpmbuild/SPECS
          mkdir -p releases
          cp wayland-client/build/unikey-wayland ~/rpmbuild/SOURCES/
          cp unikey-wayland.desktop ~/rpmbuild/SOURCES/
          cp unikey-wayland.metainfo.xml ~/rpmbuild/SOURCES/
          cp unikey-wayland.spec ~/rpmbuild/SPECS/
          rpmbuild -bs ~/rpmbuild/SPECS/unikey-wayland.spec --define "_topdir $HOME/rpmbuild"
          cp ~/rpmbuild/SRPMS/*.src.rpm releases/

      - name: Upload to Copr
        env:
          COPR_CONFIG: ${{ secrets.COPR_CONFIG }}
        run: |
          mkdir -p ~/.config
          echo "$COPR_CONFIG" > ~/.config/copr
          chmod 600 ~/.config/copr
          chmod +x upload_copr.sh
          ./upload_copr.sh

  build-ppa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PPA Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts debhelper gnupg curl dput

      - name: Configure GPG and Import Key
        env:
          PPA_GPG_PRIVATE_KEY: ${{ secrets.PPA_GPG_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "$PPA_GPG_PRIVATE_KEY" | gpg --batch --yes --import

      - name: Upload to Ubuntu PPA
        env:
          PPA_GPG_KEY_ID: ${{ secrets.PPA_GPG_KEY_ID }}
          PPA_FTP_SERVER: ${{ secrets.PPA_FTP_SERVER }}
          PPA_FTP_PATH: ${{ secrets.PPA_FTP_PATH }}
          PPA_GPG_PASSPHRASE: ${{ secrets.PPA_GPG_PASSPHRASE }}
          PPA_REVISION: ppa${{ github.run_number }}
        run: |
          # Sử dụng PATH hijacking để tạo gpg wrapper tự động điền passphrase cho debsign
          mkdir -p /tmp/bin
          cat << 'EOF' > /tmp/bin/gpg
          #!/bin/bash
          exec /usr/bin/gpg --batch --no-tty --pinentry-mode loopback --passphrase "$PPA_GPG_PASSPHRASE" "$@"
          EOF
          chmod +x /tmp/bin/gpg
          export PATH="/tmp/bin:$PATH"
          
          chmod +x upload_ppa.sh
          ./upload_ppa.sh

  build-windows-x64:
    runs-on: windows-2025-vs2026

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          dir: 'C:/Qt'

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build UnikeyWayland
        shell: cmd
        run: |
          mkdir windows-client\build
          cd windows-client\build
          cmake -DCMAKE_PREFIX_PATH="%QT_ROOT_DIR%" ..
          cmake --build . --config Release

      - name: Get Version
        shell: bash
        run: |
          VERSION=$(grep "^PKGVER=" package_arch.sh | cut -d'"' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Prepare Package Bundle
        shell: cmd
        run: |
          mkdir dist
          copy windows-client\build\Release\UnikeyWayland.exe dist\
          copy windows-client\bamboo.dll dist\
          
          :: Inject magic bytes
          echo | set /p="[UKW_VERSION]%VERSION%[/UKW_VERSION]" >> dist\UnikeyWayland.exe
          
          :: Chay windeployqt
          windeployqt --dir dist dist\UnikeyWayland.exe --no-translations --no-system-d3d-compiler
          
          :: Tao thu muc dong goi
          mkdir installer_dir
          "C:\Program Files\7-Zip\7z.exe" a -t7z installer_dir\UnikeyWayland.7z .\dist\*
          copy "C:\Program Files\7-Zip\7z.exe" installer_dir\
          copy "C:\Program Files\7-Zip\7z.dll" installer_dir\
          copy windows-client\setup.bat installer_dir\
          
          :: Nen thanh file Zip phan phoi
          mkdir releases
          "C:\Program Files\7-Zip\7z.exe" a -tzip releases\UnikeyWayland-Windows-x64.zip .\installer_dir\*

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: UnikeyWayland-Windows-x64
          path: releases/UnikeyWayland-Windows-x64.zip

      - name: Upload Asset to GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          tag_name: ${{ env.VERSION }}
          files: releases/UnikeyWayland-Windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows-arm64:
    runs-on: windows-2025-vs2026
    steps:
      - uses: actions/checkout@v4

      - name: Install Host Qt (x64)
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          dir: 'C:/Qt'

      - name: Install Target Qt (ARM64)
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_arm64_cross_compiled'
          dir: 'C:/Qt'

      - name: Set up MSVC for ARM64 Cross-compilation
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64_arm64

      - name: Build UnikeyWayland (ARM64)
        shell: cmd
        run: |
          mkdir windows-client\build
          cd windows-client\build
          cmake -A ARM64 -DCMAKE_PREFIX_PATH="C:/Qt/Qt/6.8.0/msvc2022_arm64" -DQT_HOST_PATH="C:/Qt/Qt/6.8.0/msvc2022_64" ..
          cmake --build . --config Release

      - name: Get Version
        shell: bash
        run: |
          VERSION=$(grep "^PKGVER=" package_arch.sh | cut -d'"' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Prepare Package Bundle
        shell: cmd
        run: |
          mkdir dist
          copy windows-client\build\Release\UnikeyWayland.exe dist\
          copy windows-client\bamboo.dll dist\
          
          :: Inject magic bytes
          echo | set /p="[UKW_VERSION]%VERSION%[/UKW_VERSION]" >> dist\UnikeyWayland.exe
          
          :: Chay windeployqt
          windeployqt --dir dist dist\UnikeyWayland.exe --no-translations --no-system-d3d-compiler
          
          :: Tao thu muc dong goi
          mkdir installer_dir
          "C:\Program Files\7-Zip\7z.exe" a -t7z installer_dir\UnikeyWayland.7z .\dist\*
          copy "C:\Program Files\7-Zip\7z.exe" installer_dir\
          copy "C:\Program Files\7-Zip\7z.dll" installer_dir\
          copy windows-client\setup.bat installer_dir\
          
          :: Nen thanh file Zip phan phoi
          mkdir releases
          "C:\Program Files\7-Zip\7z.exe" a -tzip releases\UnikeyWayland-Windows-ARM64.zip .\installer_dir\*

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: UnikeyWayland-Windows-ARM64
          path: releases/UnikeyWayland-Windows-ARM64.zip

      - name: Upload Asset to GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          tag_name: ${{ env.VERSION }}
          files: releases/UnikeyWayland-Windows-ARM64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-aur:
    needs: [build-and-package]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Get Version
        run: |
          VERSION=$(grep "^PKGVER=" package_arch.sh | cut -d'"' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Setup SSH for AUR
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Publish unikey-wayland (Source) to AUR
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
          git clone ssh://aur@aur.archlinux.org/unikey-wayland.git aur-src
          cd aur-src
          
          # Create PKGBUILD
          cat << 'EOF' > PKGBUILD
          pkgname=unikey-wayland
          pkgver=${{ env.VERSION }}
          pkgrel=1
          pkgdesc="Unikey Wayland Input Method for Vietnamese"
          arch=('x86_64' 'aarch64')
          url="https://github.com/${{ github.repository }}"
          license=('GPL3')
          depends=('qt6-base' 'wayland' 'ibus' 'libxkbcommon' 'libx11' 'libxtst')
          makedepends=('cmake' 'wayland-protocols' 'git' 'go')
          source=("${pkgname}-${pkgver}.tar.gz::https://github.com/${{ github.repository }}/archive/refs/tags/${pkgver}.tar.gz")
          sha256sums=('SKIP')
          
          build() {
            cd "Unikey-Wayland-${pkgver}"
            mkdir -p wayland-client/build
            cd wayland-client/build
            cmake -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_INSTALL_LIBEXECDIR=/usr/lib ..
            make
          }
          
          package() {
            cd "Unikey-Wayland-${pkgver}/wayland-client/build"
            make DESTDIR="$pkgdir" install
          }
          EOF
          
          # Generate .SRCINFO
          docker run --rm -v $PWD:/pkg -w /pkg archlinux /bin/bash -c "pacman -Sy --noconfirm base-devel sudo && useradd -m builduser && chown -R builduser:builduser /pkg && sudo -u builduser makepkg --printsrcinfo > .SRCINFO && chown -R $(id -u):$(id -g) /pkg"
          
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${{ env.VERSION }}" || echo "No changes to commit"
          git push origin master || echo "Push failed, maybe already up to date"

      - name: Publish unikey-wayland-bin (Binary) to AUR
        run: |
          git clone ssh://aur@aur.archlinux.org/unikey-wayland-bin.git aur-bin
          cd aur-bin
          
          cat << 'EOF' > PKGBUILD
          pkgname=unikey-wayland-bin
          pkgver=${{ env.VERSION }}
          pkgrel=1
          pkgdesc="Unikey Wayland Input Method for Vietnamese (Prebuilt)"
          arch=('x86_64' 'aarch64')
          url="https://github.com/${{ github.repository }}"
          license=('GPL3')
          depends=('qt6-base' 'wayland' 'ibus' 'libxkbcommon' 'libx11' 'libxtst')
          provides=('unikey-wayland')
          conflicts=('unikey-wayland')
          source_x86_64=("unikey-wayland-x86_64.pkg.tar.zst::https://github.com/${{ github.repository }}/releases/download/${pkgver}/unikey-wayland-${pkgver}-1-x86_64.pkg.tar.zst")
          source_aarch64=("unikey-wayland-aarch64.pkg.tar.zst::https://github.com/${{ github.repository }}/releases/download/${pkgver}/unikey-wayland-${pkgver}-1-aarch64.pkg.tar.zst")
          noextract=('unikey-wayland-x86_64.pkg.tar.zst' 'unikey-wayland-aarch64.pkg.tar.zst')
          sha256sums_x86_64=('SKIP')
          sha256sums_aarch64=('SKIP')
          
          package() {
            if [ "$CARCH" = "x86_64" ]; then
                bsdtar -xf "${srcdir}/unikey-wayland-x86_64.pkg.tar.zst" -C "${pkgdir}" usr
            elif [ "$CARCH" = "aarch64" ]; then
                bsdtar -xf "${srcdir}/unikey-wayland-aarch64.pkg.tar.zst" -C "${pkgdir}" usr
            fi
          }
          EOF
          
          # Generate .SRCINFO
          docker run --rm -v $PWD:/pkg -w /pkg archlinux /bin/bash -c "pacman -Sy --noconfirm base-devel sudo && useradd -m builduser && chown -R builduser:builduser /pkg && sudo -u builduser makepkg --printsrcinfo > .SRCINFO && chown -R $(id -u):$(id -g) /pkg"
          
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${{ env.VERSION }}" || echo "No changes to commit"
          git push origin master || echo "Push failed, maybe already up to date"
